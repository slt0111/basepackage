<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>红云公务员干部产品工具 - 模拟数据导入</title>
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; background: #f1f5f9; color: #0f172a; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        a { color: inherit; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .shell { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav {
            height: 52px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            background: #ffffff;
        }
        .nav-left { display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 10px; height: 10px; border-radius: 999px; background: linear-gradient(135deg, #22c55e, #0ea5e9); }
        .nav-title { font-size: 14px; font-weight: 700; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-link { font-size: 12px; color: #334155; }

        /* 三列布局：参数 / 对象清单 / 日志（说明：对象清单单独一列，提升可视面积与可操作性） */
        .body { flex: 1; min-height: 0; display: grid; grid-template-columns: 340px 440px 1fr; gap: 10px; padding: 10px; overflow: hidden; }
        .panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; min-height: 0; display: flex; flex-direction: column; }
        .panel-body { flex: 1; overflow-y: auto; padding-right: 4px; }
        
        /* 左侧参数面板样式优化 */
        .panel-body::-webkit-scrollbar { width: 6px; }
        .panel-body::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
        .panel-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .panel-body::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .panel h2 { margin: 0 0 8px; font-size: 13px; }
        .muted { color: #64748b; font-size: 11px; line-height: 1.4; }

        .form-group { margin: 8px 0; }
        label { display: block; font-size: 11px; font-weight: 600; color: #0f172a; margin: 0 0 4px; }
        select, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            font-size: 11px;
            outline: none;
        }
        .row { display: flex; gap: 10px; align-items: center; }
        .row > * { flex: 1; }

        .btn {
            border-radius: 999px;
            padding: 8px 10px;
            font-size: 11px;
            border: 1px solid transparent;
            cursor: pointer;
            background: #0f172a;
            color: #f9fafb;
            white-space: nowrap;
        }
        .btn-secondary { background: #ffffff; color: #0f172a; border-color: #e2e8f0; }
        .btn:disabled { opacity: .55; cursor: not-allowed; }

        .log-panel { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .log-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .log-box {
            flex: 1;
            min-height: 0;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #0b1220;
            color: #e2e8f0;
            padding: 10px;
            overflow: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 11px;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .pill { font-size: 11px; padding: 4px 8px; border-radius: 999px; border: 1px solid #e2e8f0; background: #f8fafc; color: #334155; }

        .progress-shell { width: 100%; height: 6px; border-radius: 999px; background: #e2e8f0; overflow: hidden; margin-bottom: 4px; }
        .progress-bar-fill { height: 100%; width: 0; background: linear-gradient(90deg, #22c55e, #0ea5e9); transition: width .25s ease-out; }
        #statusText { font-size: 11px; font-weight: 600; }
        .status-ok { color: #16a34a; }
        .status-fail { color: #dc2626; }
        .status-running { color: #2563eb; }
        .status-pending { color: #64748b; }

        .schema-list { max-height: 60px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px; background: #f8fafc; }
        .schema-list label { display: flex; align-items: center; gap: 4px; padding: 1px 0; font-size: 10px; }
        .schema-list input { width: 12px; height: 12px; }
        .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .check {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .check input { width: 14px; height: 14px; }
        .check-title { font-size: 11px; font-weight: 700; }
        .check-desc { font-size: 10px; color: #64748b; margin-top: 1px; }

        .radio-group { display: flex; flex-direction: column; gap: 4px; }
        .radio-group label { display: flex; align-items: center; gap: 6px; font-weight: normal; font-size: 11px; }
        .radio-group input { width: 14px; height: 14px; }

        /* 对象清单列：让列表区域可滚动 */
        .object-panel { display: flex; flex-direction: column; gap: 6px; min-height: 0; }
        .object-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            padding: 6px;
        }
        
        /* 对象清单滚动条样式 */
        .object-list::-webkit-scrollbar { width: 6px; }
        .object-list::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
        .object-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .object-list::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 999px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #334155;
            white-space: nowrap;
        }
        .badge-strong { border-color: rgba(59,130,246,.35); background: rgba(59,130,246,.08); color: #1d4ed8; }
        .badge-warn { border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.10); color: #166534; }
        .obj-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            margin-bottom: 4px;
        }
        .obj-item:last-child { margin-bottom: 0; }
        .obj-item input { margin-top: 3px; width: 16px; height: 16px; flex: 0 0 auto; }
        .obj-main { flex: 1; min-width: 0; }
        .obj-title {
            font-size: 11px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
            word-break: break-all;
        }
        .obj-title .comment {
            font-weight: normal;
            color: #64748b;
        }
        .obj-meta { margin-top: 3px; display: flex; flex-wrap: wrap; gap: 4px; }

        @media (max-width: 980px) {
            /* 小屏幕降级：三列变单列（说明：避免横向滚动） */
            .body { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="nav">
        <div class="nav-left">
            <span class="logo-dot" aria-hidden="true"></span>
            <span class="nav-title">红云 · 运维工具台 · 模拟数据导入</span>
        </div>
        <div class="nav-right">
            <a class="nav-link" href="export.html">模拟数据导出</a>
            <a class="nav-link" href="index.html">返回首页</a>
        </div>
    </header>

    <div class="body">
        <section class="panel" aria-label="导入参数">
            <h2>导入参数</h2>
            <div class="panel-body">
                <div class="muted">将「模拟数据导出」产出的 mockdata-*.zip 导入到目标达梦库。请使用具备 DDL 与数据写入权限的账号。</div>

                <div class="form-group">
                    <label for="jdbcUrl">JDBC 连接串（目标库）</label>
                    <input id="jdbcUrl" type="text" placeholder="例如：jdbc:dm://10.0.0.1:5236" />
                </div>
                <div class="form-group">
                    <label>目标库账号</label>
                    <div class="row">
                        <input id="dbUsername" type="text" placeholder="用户名" />
                        <input id="dbPassword" type="text" placeholder="密码" />
                    </div>
                </div>

            <div class="form-group">
                <label>上传导入包（ZIP）</label>
                <div class="row">
                    <input id="zipFile" type="file" accept=".zip" />
                    <button type="button" class="btn btn-secondary" id="btnUpload" onclick="uploadZip()">上传</button>
                </div>
                <div class="muted" id="uploadStatus" style="margin-top:6px;">未上传</div>
            </div>

                <div class="form-group">
                    <label>导入内容</label>
                    <div class="radio-group" id="ddlModeGroup">
                        <label><input type="radio" name="ddlMode" value="STRUCTURE_AND_DATA" checked />结构 + 数据（DDL + 表数据 XML）</label>
                        <label><input type="radio" name="ddlMode" value="ONLY_STRUCTURE" />仅结构（只执行 DDL）</label>
                        <label><input type="radio" name="ddlMode" value="ONLY_DATA" />仅数据（表已存在时导入 XML）</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>对象已存在时</label>
                    <div class="radio-group" id="whenExistsGroup">
                        <label><input type="radio" name="whenExists" value="SKIP" checked />跳过</label>
                        <label><input type="radio" name="whenExists" value="DROP_AND_RECREATE" />先删后建（慎用）</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="row">
                        <button type="button" class="btn" id="btnStart" onclick="startImport()" disabled>开始导入</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>导入进度</label>
                    <div class="progress-shell">
                        <div id="progressBar" class="progress-bar-fill"></div>
                    </div>
                    <div class="muted" id="progressText" style="margin-top:4px;">0%</div>
                    <div class="muted" id="progressDetail" style="margin-top:2px;">任务开始后显示。</div>
                </div>
                <div class="muted" id="statusText">状态：未开始</div>
            </div>
        </section>

        <!-- 对象清单：单独一列（说明：列表过长时更易浏览与勾选） -->
        <section class="panel object-panel" aria-label="对象清单">
            <h2>导入清单</h2>
            <div id="importSummary" class="muted" style="margin-bottom:8px;font-size:11px;">
                请上传ZIP文件以查看导入清单...
            </div>
            <div class="form-group" id="schemaSection" style="display:none;">
                <label>选择要导入的 Schema</label>
                <div id="schemaBox" class="schema-list"></div>
            </div>
            <div id="objectBox" class="object-list"></div>
        </section>

        <section class="panel log-panel" aria-label="导入日志">
            <div class="log-actions">
                <div class="pill" id="pillJob">job: -</div>
                <div class="row" style="max-width: 280px;">
                    <button type="button" class="btn btn-secondary" onclick="clearLog()">清空日志</button>
                    <button type="button" class="btn btn-secondary" onclick="pollStatusOnce()">刷新状态</button>
                </div>
            </div>
            <div id="logBox" class="log-box"></div>
        </section>
    </div>
</div>

<script src="js/message.js"></script>
<script src="js/mock-import.js"></script>
</body>
</html>
