<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>红云公务员干部产品工具 - 模拟数据导入</title>
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; background: #f1f5f9; color: #0f172a; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        a { color: inherit; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .shell { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav {
            height: 52px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            background: #ffffff;
        }
        .nav-left { display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 10px; height: 10px; border-radius: 999px; background: linear-gradient(135deg, #22c55e, #0ea5e9); }
        .nav-title { font-size: 14px; font-weight: 700; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-link { font-size: 12px; color: #334155; }

        .body { flex: 1; min-height: 0; display: grid; grid-template-columns: 380px 1fr; gap: 14px; padding: 14px; overflow: hidden; }
        .panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; min-height: 0; }
        .panel h2 { margin: 0 0 10px; font-size: 14px; }
        .muted { color: #64748b; font-size: 12px; line-height: 1.5; }

        .form-group { margin: 10px 0; }
        label { display: block; font-size: 12px; font-weight: 600; color: #0f172a; margin: 0 0 6px; }
        select, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            font-size: 12px;
            outline: none;
        }
        .row { display: flex; gap: 10px; align-items: center; }
        .row > * { flex: 1; }

        .btn {
            border-radius: 999px;
            padding: 10px 12px;
            font-size: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            background: #0f172a;
            color: #f9fafb;
            white-space: nowrap;
        }
        .btn-secondary { background: #ffffff; color: #0f172a; border-color: #e2e8f0; }
        .btn:disabled { opacity: .55; cursor: not-allowed; }

        .log-panel { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .log-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .log-box {
            flex: 1;
            min-height: 0;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #0b1220;
            color: #e2e8f0;
            padding: 12px;
            overflow: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
        }
        .pill { font-size: 11px; padding: 4px 8px; border-radius: 999px; border: 1px solid #e2e8f0; background: #f8fafc; color: #334155; }

        .progress-shell { width: 100%; height: 8px; border-radius: 999px; background: #e2e8f0; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0; background: linear-gradient(90deg, #22c55e, #0ea5e9); transition: width .25s ease-out; }
        #statusText { font-size: 13px; font-weight: 600; }
        .status-ok { color: #16a34a; }
        .status-fail { color: #dc2626; }
        .status-running { color: #2563eb; }
        .status-pending { color: #64748b; }

        .schema-list { max-height: 160px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px; background: #f8fafc; }
        .schema-list label { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
        .schema-list input { width: 16px; height: 16px; }

        .radio-group { display: flex; flex-direction: column; gap: 6px; }
        .radio-group label { display: flex; align-items: center; gap: 8px; font-weight: normal; }
        .radio-group input { width: 16px; height: 16px; }

        @media (max-width: 900px) { .body { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="shell">
    <header class="nav">
        <div class="nav-left">
            <span class="logo-dot" aria-hidden="true"></span>
            <span class="nav-title">红云 · 运维工具台 · 模拟数据导入</span>
        </div>
        <div class="nav-right">
            <a class="nav-link" href="export.html">模拟数据导出</a>
            <a class="nav-link" href="index.html">返回首页</a>
        </div>
    </header>

    <div class="body">
        <section class="panel" aria-label="导入参数">
            <h2>导入参数</h2>
            <div class="muted">将「模拟数据导出」产出的 mockdata-*.zip 导入到目标达梦库。请使用具备 DDL 与数据写入权限的账号。</div>

            <div class="form-group">
                <label for="jdbcUrl">JDBC 连接串（目标库）</label>
                <input id="jdbcUrl" type="text" placeholder="例如：jdbc:dm://10.0.0.1:5236" />
            </div>
            <div class="form-group">
                <label>目标库账号</label>
                <div class="row">
                    <input id="dbUsername" type="text" placeholder="用户名" />
                    <input id="dbPassword" type="text" placeholder="密码" />
                </div>
            </div>

            <div class="form-group">
                <label>上传导入包（ZIP）</label>
                <div class="row">
                    <input id="zipFile" type="file" accept=".zip" />
                    <button type="button" class="btn btn-secondary" id="btnUpload" onclick="uploadZip()">上传</button>
                </div>
                <div class="muted" id="uploadStatus" style="margin-top:6px;">未上传</div>
            </div>

            <div class="form-group">
                <button type="button" class="btn btn-secondary" id="btnPreview" onclick="previewZip()" disabled>预览包内容</button>
                <div class="muted" id="previewStatus" style="margin-top:6px;"></div>
            </div>

            <div class="form-group" id="schemaSection" style="display:none;">
                <label>选择要导入的 Schema</label>
                <div id="schemaBox" class="schema-list"></div>
            </div>

            <div class="form-group">
                <label>导入内容</label>
                <div class="radio-group" id="ddlModeGroup">
                    <label><input type="radio" name="ddlMode" value="STRUCTURE_AND_DATA" checked />结构 + 数据（DDL + 表数据 XML）</label>
                    <label><input type="radio" name="ddlMode" value="ONLY_STRUCTURE" />仅结构（只执行 DDL）</label>
                    <label><input type="radio" name="ddlMode" value="ONLY_DATA" />仅数据（表已存在时导入 XML）</label>
                </div>
            </div>
            <div class="form-group">
                <label>对象已存在时</label>
                <div class="radio-group" id="whenExistsGroup">
                    <label><input type="radio" name="whenExists" value="SKIP" checked />跳过</label>
                    <label><input type="radio" name="whenExists" value="DROP_AND_RECREATE" />先删后建（慎用）</label>
                </div>
            </div>

            <div class="form-group">
                <div class="row">
                    <button type="button" class="btn" id="btnStart" onclick="startImport()" disabled>开始导入</button>
                </div>
            </div>
            <div class="form-group">
                <label>导入进度</label>
                <div class="progress-shell">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>
                <div class="muted" id="progressText" style="margin-top:4px;">0%</div>
                <div class="muted" id="progressDetail" style="margin-top:2px;">任务开始后显示。</div>
            </div>
            <div class="muted" id="statusText">状态：未开始</div>
        </section>

        <section class="panel log-panel" aria-label="导入日志">
            <div class="log-actions">
                <div class="pill" id="pillJob">job: -</div>
                <div class="row" style="max-width: 280px;">
                    <button type="button" class="btn btn-secondary" onclick="clearLog()">清空日志</button>
                    <button type="button" class="btn btn-secondary" onclick="pollStatusOnce()">刷新状态</button>
                </div>
            </div>
            <div id="logBox" class="log-box"></div>
        </section>
    </div>
</div>

<script src="js/message.js"></script>
<script src="js/mock-import.js"></script>
</body>
</html>
