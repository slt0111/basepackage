<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>红云公务员干部产品工具 - 模拟数据导出</title>
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; background: #f1f5f9; color: #0f172a; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        a { color: inherit; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .shell { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav {
            height: 52px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            background: #ffffff;
        }
        .nav-left { display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 10px; height: 10px; border-radius: 999px; background: linear-gradient(135deg, #3b82f6, #22c55e); }
        .nav-title { font-size: 14px; font-weight: 700; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-link { font-size: 12px; color: #334155; }

        /* 三列布局：参数 / 对象清单 / 日志（说明：对象清单单独一列，提升可视面积与可操作性） */
        .body { flex: 1; min-height: 0; display: grid; grid-template-columns: 360px 520px 1fr; gap: 14px; padding: 14px; overflow: hidden; }
        .panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; min-height: 0; }
        .panel h2 { margin: 0 0 10px; font-size: 14px; }
        .muted { color: #64748b; font-size: 12px; line-height: 1.5; }

        .form-group { margin: 10px 0; }
        label { display: block; font-size: 12px; font-weight: 600; color: #0f172a; margin: 0 0 6px; }
        select, input[type="text"] {
            width: 100%;
            padding: 10px 10px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            font-size: 12px;
            outline: none;
        }
        .row { display: flex; gap: 10px; align-items: center; }
        .row > * { flex: 1; }

        .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .check {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .check input { width: 16px; height: 16px; }
        .check-title { font-size: 12px; font-weight: 700; }
        .check-desc { font-size: 11px; color: #64748b; margin-top: 2px; }

        .btn {
            border-radius: 999px;
            padding: 10px 12px;
            font-size: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            background: #0f172a;
            color: #f9fafb;
            white-space: nowrap;
        }
        .btn-secondary { background: #ffffff; color: #0f172a; border-color: #e2e8f0; }
        .btn:disabled { opacity: .55; cursor: not-allowed; }

        .log-panel { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .log-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .log-box {
            flex: 1;
            min-height: 0;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #0b1220;
            color: #e2e8f0;
            padding: 12px;
            overflow: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
        }
        .pill { font-size: 11px; padding: 4px 8px; border-radius: 999px; border: 1px solid #e2e8f0; background: #f8fafc; color: #334155; }

        /* 对象清单列：让列表区域可滚动 */
        .object-panel { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .object-filters { display: grid; grid-template-columns: 1fr 150px; gap: 10px; align-items: end; }
        .object-filters-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .object-list {
            flex: 1;
            min-height: 0;
            overflow: auto;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            padding: 10px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #334155;
            white-space: nowrap;
        }
        .badge-strong { border-color: rgba(59,130,246,.35); background: rgba(59,130,246,.08); color: #1d4ed8; }
        .badge-warn { border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.10); color: #166534; }
        .obj-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            margin-bottom: 8px;
        }
        .obj-item:last-child { margin-bottom: 0; }
        .obj-item input { margin-top: 3px; width: 16px; height: 16px; flex: 0 0 auto; }
        .obj-main { flex: 1; min-width: 0; }
        .obj-title {
            font-size: 12px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.3;
            word-break: break-all;
        }
        .obj-meta { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }

        /* 导出进度条 */
        .progress-shell {
            width: 100%;
            height: 8px;
            border-radius: 999px;
            background: #e2e8f0;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #3b82f6, #22c55e);
            transition: width .25s ease-out;
        }
        #progressText {
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
        }
        #progressDetail {
            font-size: 13px;
        }

        /* 状态文本高亮（成功/失败/进行中） */
        #statusText {
            font-size: 13px;
            font-weight: 600;
        }
        .status-ok { color: #16a34a; }
        .status-fail { color: #dc2626; }
        .status-running { color: #2563eb; }
        .status-pending { color: #64748b; }

        /* 帮助手册弹窗样式（复用一键部署帮助的风格） */
        .mockdata-help-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
        }
        .mockdata-help-modal {
            width: 100%;
            max-width: 1080px;
            height: 80vh;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 22px 70px rgba(15,23,42,0.35);
            display: flex;
            flex-direction: column;
        }
        .mockdata-help-modal-header {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .mockdata-help-modal-title {
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
        }
        .mockdata-help-modal-close {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            color: #64748b;
        }
        .mockdata-help-modal-body {
            flex: 1;
            min-height: 0;
        }
        .mockdata-help-modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 980px) {
            /* 小屏幕降级：三列变单列（说明：避免横向滚动） */
            .body { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="nav">
        <div class="nav-left">
            <span class="logo-dot" aria-hidden="true"></span>
            <span class="nav-title">红云 · 运维工具台 · 模拟数据导出</span>
        </div>
        <div class="nav-right">
            <!-- 模拟数据导出帮助手册入口：以弹窗方式打开，避免跳转新页面 -->
            <a class="nav-link" href="javascript:void(0)" onclick="openMockdataHelpModal(); return false;">导出帮助</a>
            <a class="nav-link" href="deploy.html">一键部署</a>
            <a class="nav-link" href="index.html">返回首页</a>
        </div>
    </header>

    <div class="body">
        <section class="panel" aria-label="导出参数">
            <h2>导出参数</h2>
            <div class="muted">
                仅支持 <strong>达梦（DM）</strong>。请使用具备元数据读取权限的 <strong>DBA 用户</strong>连接数据库，选择用户模式（Schema）与对象清单后导出。
            </div>

            <div class="form-group">
                <label for="jdbcUrl">JDBC 连接串</label>
                <input id="jdbcUrl" type="text" placeholder="例如：jdbc:dm://10.0.0.1:5236" />
            </div>

            <div class="form-group">
                <label>DBA 账号</label>
                <div class="row">
                    <input id="dbUsername" type="text" placeholder="用户名（例如：SYSDBA）" />
                    <input id="dbPassword" type="text" placeholder="密码" />
                </div>
            </div>

            <div class="form-group">
                <div class="row">
                    <button type="button" class="btn btn-secondary" id="btnLoadSchemas" onclick="loadSchemas()">连接并加载模式</button>
                    <button type="button" class="btn btn-secondary" id="btnLoadObjects" onclick="loadObjects()" disabled>加载对象清单</button>
                </div>
            </div>

            <div class="form-group">
                <label>用户模式（Schema，可多选）</label>
                <div class="muted" style="margin-bottom:6px;">建议只选择业务 schema，系统 schema 已做默认过滤。</div>
                <div id="schemaBox" class="log-box" style="background:#f8fafc;color:#0f172a;border-color:#e2e8f0;font-family:inherit;white-space:normal;"></div>
            </div>

            <div class="form-group">
                <div class="row">
                    <button type="button" class="btn" id="btnStart" onclick="startExport()" disabled>确认清单并开始导出</button>
                    <button type="button" class="btn btn-secondary" id="btnDownload" onclick="downloadZip()" disabled>下载 ZIP</button>
                </div>
            </div>

            <div class="form-group">
                <label>导出进度</label>
                <div class="progress-shell">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>
                <div class="muted" id="progressText" style="margin-top:4px;">0%</div>
                <div class="muted" id="progressDetail" style="margin-top:2px;">预计耗时和导出摘要将在任务开始后显示。</div>
            </div>

            <div class="muted" id="statusText">状态：未开始</div>
        </section>

        <!-- 对象清单：单独一列（说明：列表过长时更易浏览与勾选） -->
        <section class="panel object-panel" aria-label="对象清单">
            <h2>对象清单</h2>
            <div class="muted" style="margin-bottom:10px;">
                包含表 / 视图 / 序列 / 同义词 / 存储过程 / 函数 / 触发器。仅 <strong>表（TABLE）</strong> 导出数据 XML，其它对象只导出 DDL。
            </div>
            <div class="object-filters">
                <div class="form-group" style="margin:0;">
                    <label for="objSearch">搜索（对象名包含）</label>
                    <input id="objSearch" type="text" placeholder="例如：USER、T_、VW_" />
                </div>
                <div class="form-group" style="margin:0;">
                    <label for="objTypeFilter">对象类型</label>
                    <select id="objTypeFilter">
                        <option value="">全部类型</option>
                        <option value="TABLE">TABLE（表）</option>
                        <option value="VIEW">VIEW（视图）</option>
                        <option value="SEQUENCE">SEQUENCE（序列）</option>
                        <option value="SYNONYM">SYNONYM（同义词）</option>
                        <option value="PROCEDURE">PROCEDURE（过程）</option>
                        <option value="FUNCTION">FUNCTION（函数）</option>
                        <option value="TRIGGER">TRIGGER（触发器）</option>
                    </select>
                </div>
            </div>
            <div class="object-filters-2">
                <div class="form-group" style="margin:0;">
                    <label for="objSchemaFilter">模式（Schema）</label>
                    <select id="objSchemaFilter">
                        <option value="">全部模式</option>
                    </select>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>批量操作</label>
                    <div class="row" style="gap:8px;">
                        <button type="button" class="btn btn-secondary" onclick="toggleAllObjects(true)">全选（当前过滤结果）</button>
                        <button type="button" class="btn btn-secondary" onclick="toggleAllObjects(false)">全不选（当前过滤结果）</button>
                    </div>
                </div>
            </div>
            <div id="objectBox" class="object-list"></div>
        </section>

        <section class="panel log-panel" aria-label="导出日志">
            <div class="log-actions">
                <div class="pill" id="pillJob">job: -</div>
                <div class="row" style="max-width: 360px;">
                    <button type="button" class="btn btn-secondary" onclick="clearLog()">清空日志</button>
                    <button type="button" class="btn btn-secondary" onclick="pollStatusOnce()">刷新状态</button>
                </div>
            </div>
            <div id="logBox" class="log-box"></div>
        </section>
    </div>
</div>

<script src="js/message.js"></script>
<script src="js/export.js"></script>

<!-- 模拟数据导出帮助手册弹窗：内嵌 mockdata-help.html 文档页面 -->
<div id="mockdataHelpModalBackdrop" class="mockdata-help-modal-backdrop" role="dialog" aria-modal="true" aria-label="模拟数据导出帮助手册">
    <div class="mockdata-help-modal">
        <header class="mockdata-help-modal-header">
            <div class="mockdata-help-modal-title">模拟数据导出帮助手册</div>
            <button type="button" class="mockdata-help-modal-close" onclick="closeMockdataHelpModal()" aria-label="关闭">×</button>
        </header>
        <div class="mockdata-help-modal-body">
            <iframe src="mockdata-help.html" title="模拟数据导出帮助手册"></iframe>
        </div>
    </div>
</div>

<script>
    // 打开/关闭模拟数据导出帮助手册弹窗
    function openMockdataHelpModal() {
        var el = document.getElementById('mockdataHelpModalBackdrop');
        if (el) {
            el.style.display = 'flex';
        }
    }
    function closeMockdataHelpModal() {
        var el = document.getElementById('mockdataHelpModalBackdrop');
        if (el) {
            el.style.display = 'none';
        }
    }
</script>
</body>
</html>
